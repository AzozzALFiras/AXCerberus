# =============================================================================
# AevonX Shield WAF — Default Security Rules v2.0.0
# Engine: Coraza (ModSecurity-compatible)
#
# Rule ID ranges:
#   1001–1099  SQL Injection
#   1101–1199  Cross-Site Scripting (XSS)
#   1201–1299  Path Traversal & Local File Inclusion (LFI)
#   1301–1399  Remote File Inclusion (RFI)
#   1401–1499  Command Injection & OS Command Abuse
#   1501–1599  Log4Shell / JNDI Injection
#   1601–1699  HTTP Protocol Abuse
#   1701–1799  Scanner & Bot Detection
#   1801–1899  Sensitive File Access Protection
# =============================================================================

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json

# =============================================================================
# SQL INJECTION
# =============================================================================

# Core SQL keywords in request parameters.
SecRule ARGS|ARGS_NAMES|REQUEST_BODY \
    "@rx (?i:(\b(select|insert|update|delete|drop|truncate|alter|create|replace|merge)\b\s+\b(from|into|table|database|schema)\b))" \
    "id:1001,phase:2,deny,status:403,log,msg:'SQL Injection - DML keyword sequence',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"

# SQL comment sequences used to bypass filters.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(--|#|\/\*|\*\/|\/\*!|0x[0-9a-f]+))" \
    "id:1002,phase:2,deny,status:403,log,msg:'SQL Injection - Comment/hex evasion',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"

# UNION-based extraction.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:\bunion\b.{0,50}\bselect\b)" \
    "id:1003,phase:2,deny,status:403,log,msg:'SQL Injection - UNION SELECT',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"

# Blind SQLi time-delay functions.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(sleep\s*\(|waitfor\s+delay|benchmark\s*\())" \
    "id:1004,phase:2,deny,status:403,log,msg:'SQL Injection - Time-delay function',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"

# =============================================================================
# CROSS-SITE SCRIPTING (XSS)
# =============================================================================

# Script tag injection.
SecRule ARGS|REQUEST_BODY|REQUEST_HEADERS:Referer \
    "@rx (?i:<\s*script[^>]*>)" \
    "id:1101,phase:2,deny,status:403,log,msg:'XSS - Script tag',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# Inline event handler attributes.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:\bon\w+\s*=\s*[\"']?[^\"'>]*(?:script|javascript|vbscript|expression))" \
    "id:1102,phase:2,deny,status:403,log,msg:'XSS - Inline event handler',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# javascript: and data: URI schemes.
SecRule ARGS|REQUEST_BODY|REQUEST_HEADERS:Referer \
    "@rx (?i:(javascript\s*:|data\s*:\s*text\/html|vbscript\s*:))" \
    "id:1103,phase:2,deny,status:403,log,msg:'XSS - Dangerous URI scheme',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# DOM-based XSS via document.write / eval.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(document\.(write|cookie|location)|eval\s*\(|window\.location|innerHTML\s*=))" \
    "id:1104,phase:2,deny,status:403,log,msg:'XSS - DOM manipulation',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# Generic HTML event handler attributes (onerror, onload, onclick, onfocus, etc.).
SecRule ARGS|REQUEST_BODY|REQUEST_URI \
    "@rx (?i:<[^>]*\bon(?:abort|blur|c(?:hange|lick|o(?:ntextmenu|py)|ut)|d(?:blclick|rag(?:end|enter|leave|over|start)?|rop)|e(?:nded|rror)|focus(?:in|out)?|hashchange|input|invalid|key(?:down|press|up)|load(?:ed(?:data|metadata)|start)?|m(?:essage|ouse(?:down|enter|leave|move|o(?:ut|ver)|up))|o(?:ffline|nline)|p(?:a(?:ge(?:hide|show)|ste)|lay(?:ing)?|opstate|rogress)|re(?:s(?:et|ize)|set)|s(?:croll|e(?:arch|ek(?:ed|ing)|lect)|t(?:alled|orage)|u(?:bmit|spend))|t(?:i(?:meupdate|oggle)|ouch(?:cancel|end|move|start)|ransitionend)|un(?:handledrejection|load)|volumechange|w(?:aiting|heel))\s*=)" \
    "id:1105,phase:2,deny,status:403,log,msg:'XSS - HTML event handler attribute',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# Catch-all for any <tag on*= pattern (covers unknown/future event handlers).
SecRule ARGS|REQUEST_BODY|REQUEST_URI \
    "@rx (?i:<[^>]*\s+on[a-z]{2,}\s*=)" \
    "id:1106,phase:2,deny,status:403,log,msg:'XSS - Generic event handler injection',tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# =============================================================================
# PATH TRAVERSAL & LOCAL FILE INCLUSION (LFI)
# =============================================================================

# Directory traversal sequences in the URI path.
SecRule REQUEST_URI|ARGS \
    "@rx (?:\.\.\/|\.\.\\|%2e%2e%2f|%2e%2e\/|\.\.%2f|%2e\.%2f)" \
    "id:1201,phase:1,deny,status:403,log,msg:'Path Traversal - directory traversal',tag:'OWASP_CRS/WEB_ATTACK/PATH_TRAVERSAL'"

# Null-byte injection.
SecRule REQUEST_URI|ARGS \
    "@rx (?:%00|\\x00|\0)" \
    "id:1202,phase:1,deny,status:403,log,msg:'Path Traversal - null byte',tag:'OWASP_CRS/WEB_ATTACK/PATH_TRAVERSAL'"

# Access to critical Linux system files.
SecRule REQUEST_URI|ARGS \
    "@rx (?i:(?:\/etc\/(?:passwd|shadow|hosts|group|issue|motd|crontab)|\/proc\/self\/environ|\/proc\/version))" \
    "id:1203,phase:1,deny,status:403,log,msg:'LFI - System file access',tag:'OWASP_CRS/WEB_ATTACK/LFI'"

# PHP wrapper streams used for LFI.
SecRule REQUEST_URI|ARGS \
    "@rx (?i:(?:php:\/\/(?:filter|input|fd)|zip:\/\/|data:\/\/|phar:\/\/))" \
    "id:1204,phase:1,deny,status:403,log,msg:'LFI - PHP stream wrapper',tag:'OWASP_CRS/WEB_ATTACK/LFI'"

# =============================================================================
# REMOTE FILE INCLUSION (RFI)
# =============================================================================

# Remote URL passed as a file parameter.
SecRule ARGS \
    "@rx (?i:(?:https?|ftp):\/\/[^\/]+\/[^\s]*\.(?:php|php5|phtml|pl|py|rb|sh|asp|aspx|cgi))" \
    "id:1301,phase:2,deny,status:403,log,msg:'RFI - Remote file inclusion attempt',tag:'OWASP_CRS/WEB_ATTACK/RFI'"

# =============================================================================
# COMMAND INJECTION & OS COMMAND ABUSE
# =============================================================================

# Semicolon/pipe-chained OS commands.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:;|\||`|&&|\$\()(?:\s*(?:bash|sh|cmd|powershell|perl|python|ruby|wget|curl|nc|ncat|netcat|nmap|chmod|chown|sudo|su|id|whoami|uname|ls|cat|echo|rm|mv|cp|touch|kill|ps|env|export|source|exec|eval)(?:\s|$)))" \
    "id:1401,phase:2,deny,status:403,log,msg:'Command Injection - Chained OS command',tag:'OWASP_CRS/WEB_ATTACK/COMMAND_INJECTION'"

# Process substitution / command substitution syntax — only in values that look like shell.
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:\$\((?:bash|sh|cmd|wget|curl|nc|exec|eval)\b)" \
    "id:1402,phase:2,deny,status:403,log,msg:'Command Injection - Shell substitution',tag:'OWASP_CRS/WEB_ATTACK/COMMAND_INJECTION'"

# Backtick execution.
SecRule ARGS|REQUEST_BODY \
    "@rx `[^`]*(?:bash|sh|cmd|wget|curl|nc|exec|eval)[^`]*`" \
    "id:1403,phase:2,deny,status:403,log,msg:'Command Injection - Backtick execution',tag:'OWASP_CRS/WEB_ATTACK/COMMAND_INJECTION'"

# =============================================================================
# LOG4SHELL / JNDI INJECTION (CVE-2021-44228 and variants)
# =============================================================================

# JNDI lookup in any header or request parameter.
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY \
    "@rx (?i:\$\{(?:jndi|ctx|env|sys|lower|upper|::-)[^\}]*\})" \
    "id:1501,phase:1,deny,status:403,log,msg:'Log4Shell - JNDI injection attempt',tag:'OWASP_CRS/WEB_ATTACK/LOG4SHELL'"

# Obfuscated JNDI via nested lookup.
SecRule REQUEST_HEADERS|ARGS|REQUEST_BODY \
    "@rx (?i:\$\{(?:[^}]*\$\{[^}]*\}[^}]*)*\})" \
    "id:1502,phase:1,deny,status:403,log,msg:'Log4Shell - Nested lookup expression',tag:'OWASP_CRS/WEB_ATTACK/LOG4SHELL'"

# =============================================================================
# HTTP PROTOCOL ABUSE
# =============================================================================

# Disallow dangerous HTTP methods on non-API paths.
SecRule REQUEST_METHOD \
    "@rx ^(?:TRACE|TRACK|CONNECT|DEBUG|PATCH)$" \
    "id:1601,phase:1,deny,status:405,log,msg:'HTTP Protocol - Dangerous method',tag:'OWASP_CRS/PROTOCOL_VIOLATION'"

# Host header injection.
SecRule REQUEST_HEADERS:Host \
    "@rx (?i:(?:[<>\"']|javascript:|data:|@(?:[^@]*@)))" \
    "id:1602,phase:1,deny,status:400,log,msg:'HTTP Protocol - Host header injection',tag:'OWASP_CRS/PROTOCOL_VIOLATION'"

# HTTP Request Smuggling via Transfer-Encoding / Content-Length conflicts.
SecRule REQUEST_HEADERS:Transfer-Encoding \
    "@rx (?i:(?:chunked,|,chunked|identity,|,identity))" \
    "id:1603,phase:1,deny,status:400,log,msg:'HTTP Protocol - Transfer-Encoding smuggling',tag:'OWASP_CRS/PROTOCOL_VIOLATION'"

# =============================================================================
# SCANNER & BOT DETECTION
# =============================================================================

# Common vulnerability scanner User-Agent strings.
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:(?:nikto|nmap|nessus|masscan|sqlmap|acunetix|appscan|burpsuite|w3af|skipfish|havij|pangolin|dirbuster|gobuster|wfuzz|hydra|metasploit|zaproxy|openvas|vega|arachni|nuclei|gospider|subfinder))" \
    "id:1701,phase:1,deny,status:403,log,msg:'Scanner - Known vulnerability scanner detected',tag:'OWASP_CRS/AUTOMATION/SECURITY_SCANNER'"

# Empty User-Agent (most legitimate browsers always send one).
SecRule REQUEST_HEADERS:User-Agent \
    "@rx ^$" \
    "id:1702,phase:1,deny,status:403,log,msg:'Scanner - Empty User-Agent',tag:'OWASP_CRS/AUTOMATION/SCANNER'"

# =============================================================================
# SENSITIVE FILE ACCESS PROTECTION
# =============================================================================

# Block direct access to common sensitive files.
SecRule REQUEST_URI \
    "@rx (?i:(?:\.git\/|\.env|\.htaccess|\.htpasswd|\.aws\/credentials|wp-config\.php|web\.config|composer\.lock|package-lock\.json|phpinfo\.php|\.ssh\/|id_rsa|authorized_keys|\.bash_history|\.npmrc|\.dockerenv))" \
    "id:1801,phase:1,deny,status:403,log,msg:'Sensitive File - Direct access blocked',tag:'AEVONX/SENSITIVE_FILE'"

# Block backup and temp file extensions that expose source code.
SecRule REQUEST_URI \
    "@rx (?i:\.(?:bak|backup|old|orig|save|swp|tmp|temp|copy|sql|dump|tar|gz|tgz|zip|rar|7z)$)" \
    "id:1802,phase:1,deny,status:403,log,msg:'Sensitive File - Backup/archive file access',tag:'AEVONX/SENSITIVE_FILE'"
